<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nihira's Beauty Glow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;

  /* Background Image */
  background: url("https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9") no-repeat center center/cover;
}

/* Dark Overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* Center Box */
.container {
  width: 320px;
  padding: 30px;
  margin: auto;
  margin-top: 100px;

  /* Glass Effect */
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);

  border-radius: 15px;
  text-align: center;
  color: white;

  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* Heading */
.container h2 {
  margin-bottom: 20px;
}

/* Inputs */
input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;

  border: none;
  border-radius: 8px;
  outline: none;
}

/* Button */
button {
  width: 95%;
  padding: 12px;
  margin-top: 15px;

  background: #ff4d6d;
  border: none;
  border-radius: 8px;

  color: white;
  font-size: 16px;
  cursor: pointer;

  transition: 0.3s;
}

button:hover {
  background: #e63956;
  transform: scale(1.05);
}
</style>
</head>

<body>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<div style="
  display:flex;
  align-items:center;
  padding:15px 30px;
  width:100%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  position:fixed;
  top:0;
  left:0;
  z-index:1000;
">
  <img src="./logo.png" style="height:50px; margin-right:15px;">
  
  <h2 style="
    color:#ffb6c1;
    font-family:'Great Vibes', cursive;
    font-size:34px;
    margin:0;
  ">
    Nihira’s Beauty Glow
  </h2>
</div>

<div class="container">
  <h2>✨Nihira's Beauty Glow </h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(user !== "" && pass !== "") {
    alert("Login Successful 💖 WELCOME");
    window.location.href = "home.html";
  } else {
    alert("Please enter username and password ❗");
  }
}
</script>

</body>
</html>
